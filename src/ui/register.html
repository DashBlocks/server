<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
  </head>
  <body>
    <div>
      <h2>Join</h2>
      <div id="status"></div>
      <form id="registerForm">
        <input
          type="text"
          id="scratchUsername"
          placeholder="Username in Scratch"
          required
          minlength="3"
          maxlength="20"
        />
        <br />
        <input
          type="text"
          id="username"
          placeholder="Username"
          required
          minlength="3"
          maxlength="20"
        />
        <br />
        <input
          type="password"
          id="password"
          placeholder="Password"
          required
          minlength="8"
          maxlength="100"
        />
        <br />
        <button id="register">Create Account</button>
      </form>
      <button id="submitVerify">I did so</button>
      <div>Already have an account? <a href="/login">Log in</a></div>
    </div>

    <script>
      const form = document.getElementById("registerForm");
      const status = document.getElementById("status");
      const submitBtn = document.getElementById("register");
      const submitVerifyBtn = document.getElementById("submitVerify");
      submitVerifyBtn.style.display = "none";

      form.onsubmit = async (event) => {
        event.preventDefault();
        submitBtn.disabled = true;
        status.innerText = "Creating...";

        try {
          const response = await fetch("/auth/get-auth-code");
          const result = await response.json();
          if (!result.ok) {
            throw new Error(result.error);
          }

          status.innerHTML =
            "Copy this code:<br />\n" +
            `<code>${result.code}</code><br />\n` +
            'Open <a href="https://scratch.mit.edu/projects/1288539368">Verification Project</a><br />\n' +
            "Comment what did you copied (your verification code)<br />\n" +
            'After that click the button "I did so"<br />';
          submitBtn.style.display = "none";
          submitVerifyBtn.style.display = "block";
        } catch (error) {
          status.innerText = "Failed: " + error.message;
        } finally {
          submitBtn.disabled = false;
        }
      };

      submitVerifyBtn.onclick = async (event) => {
        event.preventDefault();
        submitVerifyBtn.disabled = true;
        status.innerText = "Verifying...";

        const scratchUsername =
          document.getElementById("scratchUsername").value;
        const username = document.getElementById("username").value;
        const password = document.getElementById("password").value;

        try {
          const response = await fetch("/auth/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ scratchUsername, username, password }),
            credentials: "include",
          });
          const data = await response.json();
          if (data.ok) {
            status.innerText = `Success!!! Your ID: ${data.userId}`;
          } else {
            throw new Error(data.error);
          }
        } catch (error) {
          status.innerText = "Failed: " + error.message;
        } finally {
          submitVerifyBtn.style.display = "none";
          submitVerifyBtn.disabled = false;

          submitBtn.style.display = "block";
          submitBtn.disabled = false;
        }
      };
    </script>
  </body>
</html>
